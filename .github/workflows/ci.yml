name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  compile:
    name: Byte-compile (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Byte-compile all scripts
        run: python -m compileall -q .

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      # Only fail on genuine errors (syntax errors, undefined names, etc.),
      # not on stylistic preferences — keeps the gate useful and low-noise.
      - name: Check for errors
        run: ruff check --select E9,F63,F7,F82 --output-format=full .

  version:
    name: Version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Both language scripts embed APP_VERSION (used by the self-updater);
      # fail if they ever drift apart so releases stay consistent.
      - name: APP_VERSION matches across scripts
        run: |
          versions=$(grep -hoE 'APP_VERSION = "[^"]+"' *.py | sort -u)
          echo "$versions"
          if [ "$(printf '%s\n' "$versions" | grep -c .)" -ne 1 ]; then
            echo "::error::APP_VERSION differs between the scripts"
            exit 1
          fi
